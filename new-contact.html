<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <div class="profile-section">
            <img src="images/profile.jpg" alt="Profile Photo" class="profile-photo">
            <h2>Astrocus Mumia <img src="images/online.jpg" alt="Online" class="online-icon"><br><small style="color: #00ff00;">.Online</small></h2>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><img src="images/home.jpg" alt="Home" class="nav-icon"> Home</a></li>
            <li><a href="new-contact.html"><img src="images/add-contact.jpg" alt="Add Contact" class="nav-icon"> Add New Contact</a></li>
            <li><a href="view-contacts.html"><img src="images/contact-list.jpg" alt="View Contacts" class="nav-icon"> View All Contacts</a></li>
        </ul>
    </nav>
    <main class="content">
        <h2>Add New Contact</h2>
        <form>
            <label>ID Number</label>
            <input type="text" placeholder="Enter Identification Number">
            <label>First Name</label>
            <input type="text" placeholder="Enter First Name">
            <label>Last Name</label>
            <input type="text" placeholder="Enter Last Name">
            <label>Gender:</label>
            <label><input type="radio" name="gender" value="male"> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
            <label for="position">Position:</label>
            <select id="position">
                <option>-Select position if Official-</option>
            </select>
            <button type="submit" class="btn btn-details"><img src="images/add-contact.jpg" alt="Add" class="btn-icon"> Submit</button>
        </form>
    </main>
</body>
</html>
